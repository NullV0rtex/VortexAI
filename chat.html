<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vortex AI | Active Session</title>
    <style>
        body { background: #020c1b; color: #e6f1ff; font-family: 'Poppins', sans-serif; margin: 0; display: flex; justify-content: center; height: 100vh; }
        .chat-container { width: 100%; max-width: 1000px; display: flex; flex-direction: column; background: #0a192f; border-left: 1px solid #233554; border-right: 1px solid #233554; }
        .header { background: #112240; padding: 20px; text-align: center; border-bottom: 2px solid #00d4ff; font-family: 'Orbitron'; color: #00d4ff; }
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px 20px; border-radius: 15px; max-width: 80%; line-height: 1.5; font-size: 0.95rem; }
        .user { background: #00d4ff; color: #020c1b; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: 500; }
        .ai { background: #112240; color: #ccd6f6; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #233554; }
        .input-area { padding: 25px; background: #020c1b; display: flex; gap: 12px; align-items: center; }
        input { flex: 1; background: #112240; border: 1px solid #233554; color: #fff; padding: 15px; border-radius: 10px; outline: none; transition: 0.3s; }
        input:focus { border-color: #00d4ff; }
        .btn { background: #00d4ff; border: none; padding: 15px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #64ffda; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="header">VORTEX CORE HUB</div>
        <div id="chat-box">
            <div class="msg ai">Welcome, <b>NullV0rtex</b>. Systems are ready. How can I assist you today? 🌪️</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Send a signal to Vortex...">
            <button class="btn" onclick="sendMessage()">SEND 🚀</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chat-box');
            if(!input.value) return;

            // User message
            box.innerHTML += `<div class="msg user">${input.value}</div>`;
            const userText = input.value;
            input.value = '';
            box.scrollTop = box.scrollHeight;

            // Placeholder AI response (Jab tak backend connect nahi hota)
            setTimeout(() => {
                box.innerHTML += `<div class="msg ai">Processing signal... (Backend connection pending) ⚡</div>`;
                box.scrollTop = box.scrollHeight;
            }, 1000);
        }
    </script>
</body>
</html>
