<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vortex Secure Access</title>
    <style>
        body { background: #020c1b; color: #00d4ff; font-family: 'Orbitron', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { border: 2px solid #00d4ff; padding: 40px; border-radius: 15px; text-align: center; background: rgba(0, 212, 255, 0.05); box-shadow: 0 0 30px rgba(0, 212, 255, 0.2); }
        h2 { letter-spacing: 3px; }
        input { background: transparent; border: 1px solid #00d4ff; color: #fff; padding: 12px; width: 250px; margin-top: 20px; border-radius: 5px; outline: none; text-align: center; }
        button { background: #00d4ff; color: #020c1b; border: none; padding: 12px 30px; margin-top: 25px; cursor: pointer; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        button:hover { box-shadow: 0 0 20px #00d4ff; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>ENCRYPTED ACCESS</h2>
        <p style="font-size: 0.8rem; color: #8892b0;">VORTEX PROTOCOL v1.0</p>
        <input type="password" id="pass" placeholder="ENTER ACCESS KEY"> <br>
        <button onclick="verify()">INITIALIZE CORE</button>
    </div>
    <script>
        function verify() {
            if(document.getElementById('pass').value === 'vortex2026') { window.location.href = 'chat.html'; }
            else { alert('ACCESS DENIED: INVALID KEY'); }
        }
    </script>
</body>
</html>
